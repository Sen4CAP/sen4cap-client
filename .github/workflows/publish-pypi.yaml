name: publish-pypi

on:
  release:
    types: [released]
  workflow_dispatch:

jobs:
  publish-job:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v6.0.2
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.68.1
          cache: false
      - name: Build packages
        run: |
          pixi run hatch build --clean
      - name: Check build
        run: |
          pixi run python -m twine check dist/*
      - name: Upload to PyPI
        run: |
          pixi run twine upload --username __token__ --password ${{ secrets.PYPI_TOKEN }} dist/*
